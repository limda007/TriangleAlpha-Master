<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0f1225"/>
    </linearGradient>
    <!-- 三角金色渐变 -->
    <linearGradient id="gold" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- 内三角暗色 -->
    <linearGradient id="innerTri" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#141830"/>
    </linearGradient>
    <!-- 蓝色光点渐变 -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <!-- 节点光晕 -->
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <!-- 微光边框 -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3a6a" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#1e2650" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2d3a6a" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="4" y="4" width="504" height="504" rx="100" ry="100" fill="url(#bg)"
        stroke="url(#borderGrad)" stroke-width="2"/>

  <!-- 底部微弱网格线（群控感） -->
  <g opacity="0.06" stroke="#60a5fa" stroke-width="1" fill="none">
    <line x1="80" y1="160" x2="432" y2="160"/>
    <line x1="80" y1="220" x2="432" y2="220"/>
    <line x1="80" y1="280" x2="432" y2="280"/>
    <line x1="80" y1="340" x2="432" y2="340"/>
    <line x1="80" y1="400" x2="432" y2="400"/>
    <line x1="140" y1="100" x2="140" y2="440"/>
    <line x1="210" y1="100" x2="210" y2="440"/>
    <line x1="280" y1="100" x2="280" y2="440"/>
    <line x1="350" y1="100" x2="350" y2="440"/>
  </g>

  <!-- 主三角形 (金色) -->
  <polygon points="256,88 392,340 120,340" fill="url(#gold)"/>

  <!-- 内镂空三角（深色） -->
  <polygon points="256,172 322,300 190,300" fill="url(#innerTri)"/>

  <!-- 三角顶部高光 -->
  <polygon points="256,88 280,140 232,140" fill="#fde68a" opacity="0.6"/>

  <!-- 监控眼 — 外圈 -->
  <circle cx="256" cy="382" r="30" fill="#ffffff" opacity="0.95"/>
  <circle cx="256" cy="382" r="28" fill="#f0f4ff"/>

  <!-- 监控眼 — 瞳孔 -->
  <circle cx="256" cy="382" r="12" fill="url(#glow)"/>
  <circle cx="256" cy="382" r="5" fill="#ffffff"/>

  <!-- 监控眼 — 外环微光 -->
  <circle cx="256" cy="382" r="36" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>

  <!-- 连接线：三角底角到两侧节点 -->
  <line x1="120" y1="340" x2="76" y2="370" stroke="#fbbf24" stroke-width="2" opacity="0.3"/>
  <line x1="392" y1="340" x2="436" y2="370" stroke="#fbbf24" stroke-width="2" opacity="0.3"/>

  <!-- 左节点 -->
  <circle cx="72" cy="374" r="10" fill="url(#nodeGlow)"/>
  <circle cx="72" cy="374" r="5" fill="#fbbf24"/>

  <!-- 右节点 -->
  <circle cx="440" cy="374" r="10" fill="url(#nodeGlow)"/>
  <circle cx="440" cy="374" r="5" fill="#fbbf24"/>

  <!-- 连接线：监控眼向下辐射 -->
  <line x1="256" y1="418" x2="200" y2="452" stroke="#60a5fa" stroke-width="1.5" opacity="0.25"/>
  <line x1="256" y1="418" x2="256" y2="456" stroke="#60a5fa" stroke-width="1.5" opacity="0.25"/>
  <line x1="256" y1="418" x2="312" y2="452" stroke="#60a5fa" stroke-width="1.5" opacity="0.25"/>

  <!-- 底部小节点（被控端示意） -->
  <circle cx="200" cy="456" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="256" cy="460" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="312" cy="456" r="4" fill="#60a5fa" opacity="0.5"/>
</svg>
