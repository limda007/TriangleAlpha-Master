sync:
  trianglealpha-master-lan:
    alpha: "."
    beta: "administrator@192.168.1.50:D:/Code/TriangleAlpha-Master"
    mode: "one-way-replica"
    ignore:
      vcs: true
      paths:
        # macOS / editor noise
        - "._*"
        - ".DS_Store"
        - ".AppleDouble"
        - ".LSOverride"
        - ".Spotlight-V100/"
        - ".TemporaryItems/"
        - ".Trashes/"
        - ".fseventsd/"
        - ".idea/"
        - ".vscode/"

        # Python environments and caches
        - ".venv/"
        - "__pycache__/"
        - ".pytest_cache/"
        - ".mypy_cache/"
        - ".ruff_cache/"
        - "*.pyc"
        - "*.pyo"
        - ".coverage"
        - ".coverage.*"

        # Build outputs
        - "build/"
        - "dist/"
        - "artifacts/"
        - "*.spec.tmp"

        # Runtime/local state generated by master/slave
        - "accounts.db"
        - "accounts.db-*"
        - "*.log"
        - "crash.log"
        - "triangle_alpha.lock"
        - "triangle_beta.lock"
        - "mutagen.yml.lock"
        - ".env"

        # OMX / local agent state
        - ".omc/"
        - ".omx/"
    permissions:
      defaultFileMode: 0644
      defaultDirectoryMode: 0755
